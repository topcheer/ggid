run:
  timeout: 5m

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gosec
    - gocritic
    - revive
    - misspell

linters-settings:
  gosec:
    excludes:
      - G104
      - G402
      - G115
      - G401
      - G404
      - G505
      - G107
      - G201
      - G306
    severity: medium
    confidence: medium
  revive:
    severity: warning
    rules:
      - name: unused-parameter
        disabled: true
  gocritic:
    disabled-checks:
      - ifElseChain
      - assignOp
      - appendAssign
      - exitAfterDefer
      - offBy1

issues:
  exclude-rules:
    # Exclude errcheck for all non-test files in services (json.Encode, tx.Rollback, json.Unmarshal patterns)
    - path: services/
      linters:
        - errcheck
    # Exclude errcheck for test files (os.WriteFile, conn.Read/Write, etc.)
    - path: _test\.go
      linters:
        - gosec
        - gocritic
        - errcheck
        - staticcheck
    - path: cmd/
      linters:
        - errcheck
        - gocritic
    - path: test/integration
      linters:
        - errcheck
        - gosec
    # Exclude errcheck for pkg that uses json.Encode pattern
    - path: pkg/(audit|transport|truststore|email)
      linters:
        - errcheck
  max-issues-per-linter: 0
  max-same-issues: 0