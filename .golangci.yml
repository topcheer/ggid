run:
  timeout: 5m
  go: '1.25'

linters:
  disable-all: true
  enable:
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gocritic

linters-settings:
  gocritic:
    disabled-checks:
      - dupBranchBody

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - gocritic
        - errcheck
    - path: cmd/main\.go
      linters:
        - errcheck
