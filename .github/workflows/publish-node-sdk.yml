name: Publish Node SDK

on:
  push:
    tags:
      - 'sdk-node-v*'
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Publish @ggid/sdk to npm
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk/node
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Build package
        run: npm run build

      - name: Run tests
        run: npm test

      - name: Publish to npm with trusted publishing
        run: npm publish --access public
        # No NPM_TOKEN needed — npm uses GitHub OIDC token via trusted publisher