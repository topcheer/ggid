name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  GO_VERSION: '1.25'

jobs:
  lint:
    name: Lint (pre-build gate)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.64.8
          args: --timeout=5m
          install-mode: goinstall

  mod-tidy:
    name: Go Mod Tidy Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Check go mod tidy
        run: |
          go mod tidy
          if ! git diff --exit-code go.mod go.sum; then
            echo "::error::go.mod/go.sum not tidy. Run 'go mod tidy' and commit."
            exit 1
          fi

  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    needs: [lint, mod-tidy]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Build all services
        run: go build ./...

      - name: Run tests
        run: make test
        timeout-minutes: 15

      - name: Generate coverage
        run: |
          go test -timeout 10m -coverprofile=coverage.out ./... 2>/dev/null || true
          go tool cover -func=coverage.out | tail -1

      - name: Upload coverage
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out
          if-no-files-found: ignore

  console-check:
    name: Console TypeScript Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: console/package-lock.json

      - name: Install dependencies
        working-directory: console
        run: npm ci || npm install

      - name: TypeScript type check
        working-directory: console
        run: npx tsc --noEmit || true

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Run govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./... || true

      - name: Run gosec
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@latest
          gosec -severity medium ./... || true

  docker-build:
    name: Docker Build (periodic)
    runs-on: ubuntu-latest
    if: false  # Disabled: periodic docker build, enable manually
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build all-in-one image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: deploy/all-in-one/Dockerfile
          push: false
          tags: ggid/ggid-all-in-one:ci-test
          cache-from: type=gha
          cache-to: type=gha,mode=max

  ui-smoke-check:
    name: UI Smoke Test (page coverage)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify all console pages have page.tsx
        run: |
          PAGES=$(find console/src/app -name "page.tsx" | wc -l)
          echo "Console pages found: $PAGES"
          if [ "$PAGES" -lt 700 ]; then
            echo "::error::Page count dropped below 700 ($PAGES)"
            exit 1
          fi
          echo "Page count check passed: $PAGES pages"

      - name: Verify smoke test script exists
        run: |
          test -f scripts/ui-smoke-test.sh
          chmod +x scripts/ui-smoke-test.sh
          bash -n scripts/ui-smoke-test.sh  # syntax check
          echo "Smoke test script syntax OK"
