name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ---- Go build + test ----
  go:
    name: Go Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Download dependencies
        run: go mod download

      - name: Build
        run: go build ./...

      - name: Test with coverage
        run: go test -race -cover -coverprofile=coverage.out ./...

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: go-coverage
          path: coverage.out

      - name: Vet
        run: go vet ./...

      - name: Run govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./... || true

  # ---- Security scan ----
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'  # Don't fail build yet

  # ---- Helm chart lint ----
  helm:
    name: Helm Chart Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Lint chart
        run: helm lint deploy/helm/ggid

      - name: Template render check
        run: helm template ggid deploy/helm/ggid --debug > /dev/null

  # ---- Console (Next.js) build ----
  console:
    name: Console Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: console
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: console/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npx next lint
        continue-on-error: true

      - name: Build
        run: npm run build

  # ---- Docker Compose E2E ----
  docker:
    name: Docker E2E
    runs-on: ubuntu-latest
    needs: [go, console]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build and start Docker stack
        working-directory: deploy
        run: |
          docker compose up -d --build
          sleep 45

      - name: Run E2E tests
        run: bash deploy/e2e-docker-test.sh

      - name: Dump container logs on failure
        if: failure()
        run: |
          for svc in gateway identity auth oauth policy org audit; do
            echo "=== $svc ==="
            docker logs ggid-$svc 2>&1 | tail -20
          done

      - name: Tear down
        if: always()
        working-directory: deploy
        run: docker compose down -v
