name: Coverage Gate

on:
  pull_request:
    branches: [main]

jobs:
  coverage:
    name: Coverage Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run tests with coverage
        run: go test -cover -coverprofile=coverage.out ./...

      - name: Check per-package coverage
        run: |
          echo "## Per-package coverage:" 
          go tool cover -func=coverage.out | grep -E "^total|coverage:"
          
          # Extract total coverage percentage
          TOTAL=$(go tool cover -func=coverage.out | grep "^total:" | awk '{print $3}' | sed 's/%//')
          echo "Total coverage: ${TOTAL}%"
          
          # Fail if below threshold
          THRESHOLD=80.0
          if (( $(echo "$TOTAL < $THRESHOLD" | bc -l) )); then
            echo "::error::Coverage ${TOTAL}% is below threshold ${THRESHOLD}%"
            exit 1
          fi
          echo "::notice::Coverage ${TOTAL}% meets threshold ${THRESHOLD}%"

      - name: Generate HTML report
        run: go tool cover -html=coverage.out -o coverage.html

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            coverage.out
            coverage.html

      - name: Comment PR with coverage
        uses: actions/github-script@v7
        with:
          script: |
            const { execSync } = require('child_process');
            try {
              const output = execSync('go tool cover -func=coverage.out', { encoding: 'utf-8' });
              const totalLine = output.split('\n').find(l => l.startsWith('total:'));
              const pct = totalLine ? totalLine.split('\t').pop() : 'unknown';
              github.rest.issues.createComment({
                ...context.repo,
                issue_number: context.issue.number,
                body: `### Coverage Report\n\nTotal coverage: **${pct}**\n\nSee the [full report artifact](https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}) for details.`
              });
            } catch (e) {
              console.error('Failed to post coverage comment:', e.message);
            }
