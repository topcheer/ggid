# ERP Demo Application Configuration

server:
  port: 8090

spring:
  application:
    name: erp-demo
  thymeleaf:
    cache: false

# GGID Configuration
# In production, use your actual GGID gateway URL
ggid:
  gateway-url: ${GGID_URL:https://ggid.iot2.win}
  tenant-id: ${GGID_TENANT_ID:00000000-0000-0000-0000-000000000001}
  jwks-url: ${GGID_JWKS_URL:https://ggid.iot2.win/oauth/jwks}

logging:
  level:
    com.example.erp: DEBUG
    dev.ggid.sdk: DEBUG
