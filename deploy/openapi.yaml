components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    UserId:
      name: id
      in: path
      required: true
      schema: { type: string }

  schemas:
    TokenSet:
      type: object
      properties:
        access_token: { type: string }
        refresh_token: { type: string }
        token_type: { type: string, example: Bearer }
        expires_in: { type: integer, example: 3600 }

    User:
      type: object
      properties:
        id: { type: string }
        username: { type: string }
        email: { type: string, format: email }
        display_name: { type: string }
        status: { type: string, enum: [active, locked, disabled] }
        created_at: { type: string, format: date-time }

    CreateUserRequest:
      type: object
      required: [username, email, password]
      properties:
        username: { type: string }
        email: { type: string, format: email }
        password: { type: string, format: password }
        display_name: { type: string }
        status: { type: string }

    UpdateUserRequest:
      type: object
      properties:
        email: { type: string, format: email }
        display_name: { type: string }
        status: { type: string }

    Role:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        key: { type: string }
        description: { type: string }

    CreateRoleRequest:
      type: object
      required: [name, key]
      properties:
        name: { type: string }
        key: { type: string }
        description: { type: string }

    Permission:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        resource: { type: string }
        action: { type: string }
        description: { type: string }

    PolicyCheckRequest:
      type: object
      required: [subject, resource, action]
      properties:
        subject: { type: string }
        resource: { type: string }
        action: { type: string }
        context:
          type: object
          additionalProperties: { type: string }

    PolicyResult:
      type: object
      properties:
        allowed: { type: boolean }
        reason: { type: string }

    Organization:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        description: { type: string }
        parent_id: { type: string }
        status: { type: string }

    Department:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        org_id: { type: string }
        parent_id: { type: string }

    AuditEvent:
      type: object
      properties:
        id: { type: string }
        action: { type: string }
        result: { type: string }
        actor_type: { type: string }
        actor_id: { type: string }
        resource_type: { type: string }
        resource_id: { type: string }
        ip_address: { type: string }
        created_at: { type: string, format: date-time }

    Agent:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        type: { type: string }
        status: { type: string }
        public_key: { type: string }
        scopes:
          type: array
          items: { type: string }

    AgentRegistration:
      type: object
      required: [name, type, public_key]
      properties:
        name: { type: string }
        type: { type: string }
        public_key: { type: string }
        scopes:
          type: array
          items: { type: string }
        max_delegation_depth: { type: integer, default: 3 }

    AgentTokenResponse:
      type: object
      properties:
        access_token: { type: string }
        token_type: { type: string }
        expires_in: { type: integer }
        delegation_chain:
          type: array
          items: { type: string }
