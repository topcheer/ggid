openapi: 3.0.3
info:
  title: GGID IAM API
  description: Production-grade Identity & Access Management API
  version: 1.0.0
  license:
    name: Apache-2.0
  contact:
    url: https://github.com/ggid/ggid

servers:
  - url: http://localhost:8080
    description: Local development
  - url: https://api.ggid.dev
    description: Production

security:
  - BearerAuth: []

paths:
  # === Auth ===
  /api/v1/auth/register:
    post:
      tags: [Auth]
      summary: Register a new user
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, email, password]
              properties:
                username: { type: string }
                email: { type: string, format: email }
                password: { type: string, format: password }
                display_name: { type: string }
      responses:
        "201": { description: User created }
        "409": { description: Username/email already exists }

  /api/v1/auth/login:
    post:
      tags: [Auth]
      summary: Login with credentials
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password]
              properties:
                username: { type: string }
                password: { type: string, format: password }
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenSet"
        "401": { description: Invalid credentials }

  /api/v1/auth/refresh:
    post:
      tags: [Auth]
      summary: Refresh access token
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refresh_token]
              properties:
                refresh_token: { type: string }
      responses:
        "200":
          description: New token set
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenSet"

  # === Users ===
  /api/v1/users:
    get:
      tags: [Users]
      summary: List users
      parameters:
        - name: q
          in: query
          schema: { type: string }
          description: Search query
        - name: limit
          in: query
          schema: { type: integer, default: 50 }
        - name: offset
          in: query
          schema: { type: integer, default: 0 }
      responses:
        "200":
          description: User list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"
    post:
      tags: [Users]
      summary: Create user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUserRequest"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /api/v1/users/{id}:
    get:
      tags: [Users]
      summary: Get user by ID
      parameters:
        - $ref: "#/components/parameters/UserId"
      responses:
        "200":
          description: User details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "404": { description: User not found }
    put:
      tags: [Users]
      summary: Update user
      parameters:
        - $ref: "#/components/parameters/UserId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserRequest"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
    delete:
      tags: [Users]
      summary: Delete user
      parameters:
        - $ref: "#/components/parameters/UserId"
      responses:
        "204": { description: User deleted }

  /api/v1/users/{id}/lock:
    post:
      tags: [Users]
      summary: Lock user account
      parameters:
        - $ref: "#/components/parameters/UserId"
      responses:
        "200": { description: User locked }

  /api/v1/users/{id}/unlock:
    post:
      tags: [Users]
      summary: Unlock user account
      parameters:
        - $ref: "#/components/parameters/UserId"
      responses:
        "200": { description: User unlocked }

  # === Roles & Permissions ===
  /api/v1/roles:
    get:
      tags: [Policy]
      summary: List roles
      responses:
        "200":
          description: Role list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Role"
    post:
      tags: [Policy]
      summary: Create role
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRoleRequest"
      responses:
        "201":
          description: Role created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Role"

  /api/v1/roles/{id}:
    get:
      tags: [Policy]
      summary: Get role
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Role details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Role"
    delete:
      tags: [Policy]
      summary: Delete role
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "204": { description: Role deleted }

  /api/v1/roles/assign:
    post:
      tags: [Policy]
      summary: Assign role to user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [user_id, role_id]
              properties:
                user_id: { type: string }
                role_id: { type: string }
      responses:
        "200": { description: Role assigned }

  /api/v1/permissions:
    get:
      tags: [Policy]
      summary: List all permissions
      responses:
        "200":
          description: Permission list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Permission"

  /api/v1/policies/check:
    post:
      tags: [Policy]
      summary: Check permission (ABAC)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PolicyCheckRequest"
      responses:
        "200":
          description: Policy decision
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PolicyResult"

  # === Organizations ===
  /api/v1/orgs:
    get:
      tags: [Organizations]
      summary: List organizations
      responses:
        "200":
          description: Organization list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Organization"
    post:
      tags: [Organizations]
      summary: Create organization
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name: { type: string }
                description: { type: string }
      responses:
        "201":
          description: Organization created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Organization"

  /api/v1/orgs/{id}/departments:
    get:
      tags: [Organizations]
      summary: List departments
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Department list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Department"

  # === Audit ===
  /api/v1/audit/events:
    get:
      tags: [Audit]
      summary: Query audit events
      parameters:
        - name: action
          in: query
          schema: { type: string }
        - name: start_date
          in: query
          schema: { type: string, format: date-time }
        - name: end_date
          in: query
          schema: { type: string, format: date-time }
        - name: limit
          in: query
          schema: { type: integer, default: 100 }
      responses:
        "200":
          description: Audit events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AuditEvent"

  /api/v1/audit/stream:
    get:
      tags: [Audit]
      summary: SSE stream of audit events
      responses:
        "200":
          description: Server-Sent Events stream
          content:
            text/event-stream: {}

  /api/v1/audit/export:
    get:
      tags: [Audit]
      summary: Export audit events
      parameters:
        - name: format
          in: query
          schema: { type: string, enum: [csv, json], default: json }
      responses:
        "200":
          description: Exported data

  /api/v1/audit/integrity:
    get:
      tags: [Audit]
      summary: Verify audit hash chain integrity
      responses:
        "200":
          description: Integrity status
          content:
            application/json:
              schema:
                type: object
                properties:
                  valid: { type: boolean }
                  broken_at: { type: string }

  # === Agent Identity ===
  /api/v1/agents:
    get:
      tags: [Agents]
      summary: List registered AI agents
      responses:
        "200":
          description: Agent list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Agent"
    post:
      tags: [Agents]
      summary: Register a new AI agent
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AgentRegistration"
      responses:
        "201":
          description: Agent registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Agent"

  /api/v1/agents/{id}/token:
    post:
      tags: [Agents]
      summary: Exchange agent token
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [subject_token, scopes]
              properties:
                subject_token: { type: string }
                scopes:
                  type: array
                  items: { type: string }
      responses:
        "200":
          description: Agent token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentTokenResponse"

  # === Policy: Permission Tree & Rate Limits ===
  /api/v1/policy/permissions/tree:
    get:
      tags: [Policy]
      summary: Get permission inheritance tree
      responses:
        '200':
          description: Permission tree
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PermissionTree'

  /api/v1/policy/rate-limits:
    get:
      tags: [Policy]
      summary: Get per-tenant rate limit configuration
      responses:
        '200':
          description: Rate limit config
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RateLimitConfig'
    put:
      tags: [Policy]
      summary: Update per-tenant rate limit configuration
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RateLimitConfig'
      responses:
        '200': { description: Updated }

  /api/v1/policies/abac/evaluate:
    post:
      tags: [Policy]
      summary: Evaluate ABAC conditions
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ABACEvalRequest'
      responses:
        '200':
          description: Evaluation result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ABACEvalResult'

  /api/v1/policy/delegation/validate:
    post:
      tags: [Policy]
      summary: Validate delegation chain
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DelegationValidateRequest'
      responses:
        '200':
          description: Validation result

  # === Auth: Login Security ===
  /api/v1/auth/password-history-check:
    post:
      tags: [Auth]
      summary: Check password against history
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [user_id, new_password]
              properties:
                user_id: { type: string, format: uuid }
                new_password: { type: string }
      responses:
        '200':
          description: Check result

  /api/v1/auth/login-attempts/{user_id}:
    get:
      tags: [Auth]
      summary: Get login attempt history
      parameters:
        - name: user_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Login attempts

  /api/v1/auth/login-attempts/{user_id}/reset:
    post:
      tags: [Auth]
      summary: Reset login attempts
      parameters:
        - name: user_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200': { description: Reset successful }

  /api/v1/auth/sessions/stream:
    get:
      tags: [Auth]
      summary: Session activity stream (SSE)
      responses:
        '200':
          description: SSE stream
          content:
            text/event-stream: {}

  # === Audit: SIEM & Compliance ===
  /api/v1/audit/siem/health:
    get:
      tags: [Audit]
      summary: SIEM forwarder health
      responses:
        '200':
          description: SIEM health status

  /api/v1/audit/alert-webhooks:
    get:
      tags: [Audit]
      summary: List alert webhooks
      responses:
        '200':
          description: Alert webhooks list
    post:
      tags: [Audit]
      summary: Create alert webhook
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [url]
              properties:
                url: { type: string, format: uri }
                secret: { type: string }
                events:
                  type: array
                  items: { type: string }
      responses:
        '201': { description: Created }
    delete:
      tags: [Audit]
      summary: Delete alert webhook
      parameters:
        - name: id
          in: query
          required: true
          schema: { type: string }
      responses:
        '204': { description: Deleted }

  /api/v1/audit/compliance-schedules:
    get:
      tags: [Audit]
      summary: List compliance report schedules
      responses:
        '200':
          description: Schedules
    post:
      tags: [Audit]
      summary: Create compliance report schedule
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [report_type, frequency]
              properties:
                report_type: { type: string, enum: [soc2, hipaa, gdpr, custom] }
                frequency: { type: string, enum: [daily, weekly, monthly] }
                recipients:
                  type: array
                  items: { type: string }
      responses:
        '201': { description: Created }
    put:
      tags: [Audit]
      summary: Update compliance report schedule
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200': { description: Updated }
    delete:
      tags: [Audit]
      summary: Delete compliance report schedule
      parameters:
        - name: id
          in: query
          required: true
          schema: { type: string }
      responses:
        '204': { description: Deleted }

  # === OAuth: Introspection Config & Consent ===
  /api/v1/oauth/introspection/config:
    get:
      tags: [OAuth]
      summary: Get introspection cache config
      responses:
        '200':
          description: Config
    put:
      tags: [OAuth]
      summary: Update introspection cache config
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                cache_ttl_seconds: { type: integer, default: 300 }
                cache_enabled: { type: boolean, default: true }
      responses:
        '200': { description: Updated }

  /api/v1/oauth/consent/list:
    get:
      tags: [OAuth]
      summary: List user consents
      parameters:
        - name: user_id
          in: query
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Consents list

  /api/v1/oauth/consent/{id}:
    delete:
      tags: [OAuth]
      summary: Revoke consent
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '204': { description: Revoked }

  /api/v1/oauth/token-exchange:
    post:
      tags: [OAuth]
      summary: Token exchange (RFC 8693)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [subject_token, subject_token_type]
              properties:
                subject_token: { type: string }
                subject_token_type: { type: string }
                actor_token: { type: string }
                audience: { type: string }
                scope: { type: string }
      responses:
        '200':
          description: New token

  # === Identity: Account Linking & Import ===
  /api/v1/users/{id}/link:
    post:
      tags: [Identity]
      summary: Link external provider to user
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [provider, external_id]
              properties:
                provider: { type: string }
                external_id: { type: string }
                external_email: { type: string }
      responses:
        '200': { description: Linked }

  /api/v1/users/{id}/link/{provider}:
    delete:
      tags: [Identity]
      summary: Unlink external provider
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: provider
          in: path
          required: true
          schema: { type: string }
      responses:
        '204': { description: Unlinked }

  /api/v1/users/import/validate:
    post:
      tags: [Identity]
      summary: Validate user import data
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                users:
                  type: array
                  items:
                    type: object
                    properties:
                      username: { type: string }
                      email: { type: string }
      responses:
        '200':
          description: Validation result

  # === Auth: Sessions ===
  /api/v1/auth/sessions:
    get:
      tags: [Auth, Sessions]
      summary: List active sessions
      security: [{BearerAuth: []}]
      responses:
        '200': { description: Session list }

  /api/v1/auth/sessions/{id}:
    delete:
      tags: [Auth, Sessions]
      summary: Revoke a session
      security: [{BearerAuth: []}]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200': { description: Session revoked }

  # === Auth: MFA ===
  /api/v1/auth/mfa/enroll:
    post:
      tags: [Auth, MFA]
      summary: Enroll MFA (TOTP)
      security: [{BearerAuth: []}]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                method: { type: string, example: totp }
      responses:
        '200': { description: MFA enrollment with QR secret }

  /api/v1/auth/mfa/verify:
    post:
      tags: [Auth, MFA]
      summary: Verify MFA code
      security: [{BearerAuth: []}]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                code: { type: string }
      responses:
        '200': { description: MFA verified }

  /api/v1/auth/mfa/backup-codes:
    get:
      tags: [Auth, MFA]
      summary: List backup codes
      security: [{BearerAuth: []}]
      responses:
        '200': { description: Backup codes }
    post:
      tags: [Auth, MFA]
      summary: Generate new backup codes
      security: [{BearerAuth: []}]
      responses:
        '200': { description: New backup codes generated }

  # === Auth: WebAuthn ===
  /api/v1/auth/webauthn/begin:
    post:
      tags: [Auth, WebAuthn]
      summary: Begin WebAuthn registration
      security: [{BearerAuth: []}]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                user_id: { type: string }
      responses:
        '200': { description: Registration challenge }

  /api/v1/auth/webauthn/finish:
    post:
      tags: [Auth, WebAuthn]
      summary: Finish WebAuthn registration
      security: [{BearerAuth: []}]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                credential_id: { type: string }
                public_key: { type: string }
                aaguid: { type: string }
      responses:
        '201': { description: Credential registered }

  /api/v1/auth/webauthn/login/begin:
    post:
      tags: [Auth, WebAuthn]
      summary: Begin WebAuthn login
      responses:
        '200': { description: Login challenge }

  /api/v1/auth/webauthn/login/finish:
    post:
      tags: [Auth, WebAuthn]
      summary: Finish WebAuthn login
      responses:
        '200': { description: Login successful with JWT tokens }

  # === Auth: Password ===
  /api/v1/auth/password/strength:
    post:
      tags: [Auth]
      summary: Evaluate password strength (zxcvbn score 0-4)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                password: { type: string }
      responses:
        '200': { description: Strength score with crack time and suggestions }

  /api/v1/auth/password/change:
    post:
      tags: [Auth]
      summary: Change password (requires current password)
      security: [{BearerAuth: []}]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                old_password: { type: string }
                new_password: { type: string }
      responses:
        '200': { description: Password changed }

  # === OAuth: Clients ===
  /api/v1/oauth/clients:
    get:
      tags: [OAuth]
      summary: List OAuth clients
      security: [{BearerAuth: []}]
      responses:
        '200': { description: Client list }
    post:
      tags: [OAuth]
      summary: Create OAuth client
      security: [{BearerAuth: []}]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                redirect_uris:
                  type: array
                  items: { type: string }
                grant_types:
                  type: array
                  items: { type: string }
      responses:
        '201': { description: Client created }

  /api/v1/oauth/clients/{id}:
    get:
      tags: [OAuth]
      summary: Get OAuth client
      security: [{BearerAuth: []}]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200': { description: Client detail }
    delete:
      tags: [OAuth]
      summary: Delete OAuth client
      security: [{BearerAuth: []}]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200': { description: Client deleted }

  # === OAuth: Discovery ===
  /.well-known/openid-configuration:
    get:
      tags: [OAuth]
      summary: OIDC discovery document
      responses:
        '200': { description: OIDC configuration }

  /.well-known/jwks.json:
    get:
      tags: [OAuth]
      summary: JWKS public keys
      responses:
        '200': { description: JSON Web Key Set }

  # === Policy: CRUD ===
  /api/v1/policies:
    get:
      tags: [Policy]
      summary: List policies
      security: [{BearerAuth: []}]
      responses:
        '200': { description: Policy list }
    post:
      tags: [Policy]
      summary: Create policy
      security: [{BearerAuth: []}]
      responses:
        '201': { description: Policy created }

  /api/v1/policies/{id}:
    get:
      tags: [Policy]
      summary: Get policy by ID
