# GGID Prometheus Alerting Rules
# Comprehensive alerts for all GGID services
# Deploy: kubectl apply -f deploy/monitoring/alerts.yml (or mount into prometheus config)

groups:
  # === Infrastructure Alerts ===
  - name: ggid-infrastructure
    interval: 30s
    rules:
      - alert: ServiceDown
        expr: up{job=~"gateway|auth|identity|oauth|audit|policy"} == 0
        for: 1m
        labels:
          severity: critical
          category: availability
        annotations:
          summary: "Service {{ $labels.job }} is down"
          description: "{{ $labels.job }} on {{ $labels.instance }} has been down for more than 1 minute."
          runbook: "https://wiki.ggid.dev/runbooks/service-down"

      - alert: HighMemoryUsage
        expr: |
          container_memory_working_set_bytes{container!=""}
          / container_spec_memory_limit_bytes{container!=""} > 0.85
        for: 5m
        labels:
          severity: warning
          category: resource
        annotations:
          summary: "High memory usage on {{ $labels.pod }}"
          description: "Container {{ $labels.pod }} memory usage is {{ $value | humanizePercentage }} of limit."
          runbook: "https://wiki.ggid.dev/runbooks/high-memory"

      - alert: DiskSpaceLow
        expr: |
          (node_filesystem_avail_bytes{mountpoint="/",fstype!~"tmpfs|overlay"})
          / node_filesystem_size_bytes{mountpoint="/",fstype!~"tmpfs|overlay"} < 0.20
        for: 5m
        labels:
          severity: warning
          category: resource
        annotations:
          summary: "Low disk space on {{ $labels.instance }}"
          description: "Disk usage on {{ $labels.instance }} is above 80% ({{ $value | humanizePercentage }} free remaining)."
          runbook: "https://wiki.ggid.dev/runbooks/disk-space"

  # === API Gateway Alerts ===
  - name: ggid-gateway
    interval: 30s
    rules:
      - alert: HighErrorRate
        expr: |
          sum(rate(http_requests_total{job=~"gateway|auth|identity|oauth|audit",status=~"5.."}[5m]))
          / sum(rate(http_requests_total{job=~"gateway|auth|identity|oauth|audit"}[5m])) > 0.05
        for: 5m
        labels:
          severity: critical
          category: error
        annotations:
          summary: "High error rate ({{ $value | humanizePercentage }})"
          description: "Error rate across GGID services exceeds 5% for 5 minutes."
          runbook: "https://wiki.ggid.dev/runbooks/high-error-rate"

      - alert: HighLatency
        expr: |
          histogram_quantile(0.95,
            sum(rate(http_request_duration_ms_bucket{job=~"gateway|auth|identity|oauth|audit"}[5m])) by (le, job)
          ) > 500
        for: 5m
        labels:
          severity: warning
          category: performance
        annotations:
          summary: "High p95 latency on {{ $labels.job }}"
          description: "p95 latency for {{ $labels.job }} exceeds 500ms for 5 minutes."
          runbook: "https://wiki.ggid.dev/runbooks/high-latency"

      - alert: RateLimitTriggered
        expr: |
          sum(rate(http_requests_total{job="gateway",status="429"}[1m])) > 100
        for: 2m
        labels:
          severity: warning
          category: traffic
        annotations:
          summary: "Rate limit triggering frequently ({{ $value }}/min)"
          description: "Gateway is returning 429 responses at {{ $value }} per minute, indicating potential abuse or misconfigured limits."
          runbook: "https://wiki.ggid.dev/runbooks/rate-limit"

  # === Security Alerts ===
  - name: ggid-security
    interval: 30s
    rules:
      - alert: ITDRHighSeverityDetections
        expr: |
          sum(rate(itdr_detections_total{severity=~"high|critical"}[5m])) > 0
        for: 1m
        labels:
          severity: critical
          category: security
        annotations:
          summary: "ITDR high/critical detection fired"
          description: "ITDR engine detected a high or critical severity threat. Immediate investigation required."
          runbook: "https://wiki.ggid.dev/runbooks/itdr-detection"

      - alert: BruteForceDetected
        expr: |
          sum(rate(itdr_detections_total{rule_id="brute_force"}[10m])) > 0
        for: 30s
        labels:
          severity: critical
          category: security
        annotations:
          summary: "Brute force attack detected"
          description: "ITDR brute force rule has triggered. Check affected users and consider account lockout."
          runbook: "https://wiki.ggid.dev/runbooks/brute-force"

      - alert: SessionRevocationSpike
        expr: |
          sum(rate(session_revocations_total[5m])) > 10
        for: 2m
        labels:
          severity: warning
          category: security
        annotations:
          summary: "Session revocation spike ({{ $value }}/5min)"
          description: "Unusual number of session revocations may indicate active threat response or compromise."

      - alert: CertExpiringSoon
        expr: |
          (x509_cert_expiry_timestamp - time()) / 86400 < 7
        for: 1h
        labels:
          severity: warning
          category: security
        annotations:
          summary: "Certificate expiring in < 7 days"
          description: "TLS certificate for {{ $labels.cn }} expires in {{ $value }} days."
          runbook: "https://wiki.ggid.dev/runbooks/cert-renewal"

  # === Database Alerts ===
  - name: ggid-database
    interval: 30s
    rules:
      - alert: PostgreSQLConnectionsHigh
        expr: |
          pg_stat_database_numbackends / pg_settings_max_connections{setting="max_connections"} > 0.80
        for: 5m
        labels:
          severity: warning
          category: database
        annotations:
          summary: "PostgreSQL connection pool near capacity"
          description: "Database connections are at {{ $value | humanizePercentage }} of max_connections."
          runbook: "https://wiki.ggid.dev/runbooks/pg-connections"

      - alert: PostgreSQLSlowQueries
        expr: |
          pg_stat_activity_max_tx_duration > 300
        for: 2m
        labels:
          severity: warning
          category: database
        annotations:
          summary: "Long-running PostgreSQL query ({{ $value }}s)"
          description: "A query has been running for more than 5 minutes."

  # === Go Runtime Alerts ===
  - name: ggid-runtime
    interval: 30s
    rules:
      - alert: HighGoroutineCount
        expr: go_goroutines{job=~"gateway|auth|identity|oauth|audit"} > 1000
        for: 5m
        labels:
          severity: warning
          category: runtime
        annotations:
          summary: "High goroutine count on {{ $labels.job }}"
          description: "{{ $labels.job }} has {{ $value }} goroutines — possible goroutine leak."

      - alert: GCPauseHigh
        expr: |
          rate(go_gc_duration_seconds_sum[5m]) / rate(go_gc_duration_seconds_count[5m]) > 0.1
        for: 5m
        labels:
          severity: info
          category: runtime
        annotations:
          summary: "High GC pause time on {{ $labels.job }}"
          description: "Average GC pause > 100ms may indicate memory pressure."
