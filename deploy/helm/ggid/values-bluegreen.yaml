# Blue/Green deployment — instant switch between two environments
# Usage: helm upgrade ggid deploy/helm/ggid/ -f values-prod.yaml -f values-bluegreen.yaml
# Requires: Argo Rollouts with bluegreen strategy

# Blue/Green: two full sets of replicas, switch via selector
gateway:
  replicaCount: 3
  rollout:
    enabled: true
    strategy: blueGreen
    blueGreen:
      activeService: ggid-gateway-active
      previewService: ggid-gateway-preview
      autoPromotionEnabled: false  # Manual promotion for safety
      autoPromotionSeconds: 300    # Auto-promote after 5 min if health checks pass
      scaleDownDelaySeconds: 60

identity:
  replicaCount: 3
  rollout:
    enabled: true
    strategy: blueGreen
    blueGreen:
      activeService: ggid-identity-active
      previewService: ggid-identity-preview
      autoPromotionEnabled: false
      scaleDownDelaySeconds: 60

