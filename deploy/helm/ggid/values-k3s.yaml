# K3s lightweight deployment — uses manually deployed infra pods
global:
  imageRegistry: registry.iot2.win

# Disable built-in infra (using manually deployed pods in ggid namespace)
postgresql:
  enabled: false
redis:
  enabled: false
nats:
  enabled: false

externalDatabase:
  host: "ggid-postgresql"
  port: 5432
  username: ggid
  password: "ggid-k3s"
  database: ggid
externalRedis:
  host: "ggid-redis"
  port: 6379
externalNats:
  host: "ggid-nats"
  port: 4222

# All services: single replica, minimal resources
gateway:
  enabled: true
  image: {repository: ggid/gateway, tag: "latest", pullPolicy: Always}
  replicaCount: 1
  service: {type: NodePort, port: 8080}
  resources: {limits: {cpu: 200m, memory: 128Mi}, requests: {cpu: 50m, memory: 64Mi}}
  autoscaling: {enabled: false}
  podDisruptionBudget: {enabled: false}
  networkPolicy: {enabled: false}
  env:
    JWKS_REFRESH_INTERVAL: "15m"
    LOG_LEVEL: info

identity:
  enabled: true
  image: {repository: ggid/identity, tag: "latest", pullPolicy: Always}
  replicaCount: 1
  service: {type: ClusterIP, httpPort: 8080, grpcPort: 50051}
  resources: {limits: {cpu: 200m, memory: 128Mi}, requests: {cpu: 50m, memory: 64Mi}}

auth:
  enabled: true
  image: {repository: ggid/auth, tag: "latest", pullPolicy: Always}
  replicaCount: 1
  service: {type: ClusterIP, httpPort: 9001, grpcPort: 50052}
  resources: {limits: {cpu: 200m, memory: 128Mi}, requests: {cpu: 50m, memory: 64Mi}}

policy:
  enabled: true
  image: {repository: ggid/policy, tag: "latest", pullPolicy: Always}
  replicaCount: 1
  service: {type: ClusterIP, httpPort: 8070, grpcPort: 9070}
  resources: {limits: {cpu: 200m, memory: 128Mi}, requests: {cpu: 50m, memory: 64Mi}}

org:
  enabled: true
  image: {repository: ggid/org, tag: "latest", pullPolicy: Always}
  replicaCount: 1
  service: {type: ClusterIP, httpPort: 8071, grpcPort: 9071}
  resources: {limits: {cpu: 200m, memory: 128Mi}, requests: {cpu: 50m, memory: 64Mi}}

audit:
  enabled: true
  image: {repository: ggid/audit, tag: "latest", pullPolicy: Always}
  replicaCount: 1
  service: {type: ClusterIP, httpPort: 8072, grpcPort: 9072}
  resources: {limits: {cpu: 200m, memory: 128Mi}, requests: {cpu: 50m, memory: 64Mi}}

oauth:
  enabled: true
  image: {repository: ggid/oauth, tag: "latest", pullPolicy: Always}
  replicaCount: 1
  service: {type: ClusterIP, httpPort: 9005}
  resources: {limits: {cpu: 200m, memory: 128Mi}, requests: {cpu: 50m, memory: 64Mi}}

networkPolicy: {enabled: false}
jwt: {secret: "k3s-jwt-dev-secret"}
config: {defaultTenantId: "00000000-0000-0000-0000-000000000001", logLevel: info}
ingress: {enabled: false}
