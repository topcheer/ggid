apiVersion: v1
kind: Secret
metadata:
  name: {{ include "ggid.fullname" . }}-db-secret
  labels:
    {{- include "ggid.labels" . | nindent 4 }}
type: Opaque
stringData:
  password: {{ .Values.postgresql.auth.password | quote }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "ggid.fullname" . }}-jwt-secret
  labels:
    {{- include "ggid.labels" . | nindent 4 }}
type: Opaque
stringData:
  secret: {{ .Values.jwt.secret | default (randAlphaNum 32) | quote }}
