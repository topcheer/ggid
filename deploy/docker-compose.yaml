services:
  # === Infrastructure ===
  postgres:
    image: postgres:16-alpine
    container_name: ggid-postgres
    environment:
      POSTGRES_USER: ggid
      POSTGRES_PASSWORD: ggid
      POSTGRES_DB: ggid
    ports:
      - "5432:5432"
    volumes:
      - ggid-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ggid"]
      interval: 3s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: ggid-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 10

  nats:
    image: nats:2-alpine
    container_name: ggid-nats
    ports:
      - "4222:4222"
      - "8222:8222"
    command: ["-js"]
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8222/healthz"]
      interval: 5s
      timeout: 3s
      retries: 10

  # LDAP test server
  ldap:
    image: osixia/openldap:1.5.0
    container_name: ggid-ldap
    environment:
      LDAP_ORGANISATION: "GGID Test Corp"
      LDAP_DOMAIN: "corp.local"
      LDAP_BASE_DN: "dc=corp,dc=local"
      LDAP_ADMIN_PASSWORD: "admin123"
    ports:
      - "389:389"
      - "636:636"
    volumes:
      - ggid-ldapdata:/var/lib/ldap
      - ggid-ldapconfig:/etc/ldap/slapd.d

  ldap-seed:
    image: osixia/openldap:1.5.0
    container_name: ggid-ldap-seed
    depends_on:
      - ldap
    environment:
      LDAP_HOST: "ldap"
      LDAP_PORT: "389"
      LDAP_ADMIN_PASSWORD: "admin123"
    entrypoint: ""
    command: ["sh", "-c", "sleep 5 && ldapadd -x -H ldap://ldap:389 -D cn=admin,dc=corp,dc=local -w admin123 -f /seed/users.ldif && ldapadd -x -H ldap://ldap:389 -D cn=admin,dc=corp,dc=local -w admin123 -f /seed/groups.ldif && echo 'LDAP seed done'"]
    volumes:
      - ./ldap-seed:/seed:ro
    restart: "no"

  # === Microservices ===
  identity:
    build:
      context: ..
      dockerfile: services/identity/Dockerfile
    container_name: ggid-identity
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgres://ggid:ggid@postgres:5432/ggid?sslmode=disable"
    ports:
      - "8081:8080"
      - "50051:9090"

  auth:
    build:
      context: ..
      dockerfile: services/auth/Dockerfile
    container_name: ggid-auth
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      DATABASE_URL: "postgres://ggid:ggid@postgres:5432/ggid?sslmode=disable"
      REDIS_ADDR: "redis:6379"
      AUTH_HTTP_ADDR: ":9001"
      JWT_PRIVATE_KEY_PATH: "/configs/rsa_private.pem"
      JWT_PUBLIC_KEY_PATH: "/configs/rsa_public.pem"
    ports:
      - "9001:9001"
    volumes:
      - ggid-configs:/configs

  gateway:
    build:
      context: ..
      dockerfile: services/gateway/Dockerfile
    container_name: ggid-gateway
    depends_on:
      - auth
      - identity
      - policy
      - org
      - audit
    environment:
      GATEWAY_ADDR: ":8080"
      JWT_PUBLIC_KEY_PATH: "/configs/rsa_public.pem"
      AUTH_SERVICE_URL: "http://auth:9001"
      IDENTITY_SERVICE_URL: "http://identity:8080"
      POLICY_SERVICE_URL: "http://policy:8070"
      ROLES_SERVICE_URL: "http://policy:8070"
      ORG_SERVICE_URL: "http://org:8071"
      AUDIT_SERVICE_URL: "http://audit:8072"
      OAUTH_SERVICE_URL: "http://oauth:9005"
      SAML_SERVICE_URL: "http://oauth:9005"
    ports:
      - "8080:8080"
    volumes:
      - ggid-configs:/configs:ro

  policy:
    build:
      context: ..
      dockerfile: services/policy/Dockerfile
    container_name: ggid-policy
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgres://ggid:ggid@postgres:5432/ggid?sslmode=disable"
    ports:
      - "8070:8070"
      - "9070:9070"

  org:
    build:
      context: ..
      dockerfile: services/org/Dockerfile
    container_name: ggid-org
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgres://ggid:ggid@postgres:5432/ggid?sslmode=disable"
      ORG_HTTP_ADDR: ":8071"
      ORG_GRPC_ADDR: ":9071"
    ports:
      - "8071:8071"
      - "9071:9071"

  audit:
    build:
      context: ..
      dockerfile: services/audit/Dockerfile
    container_name: ggid-audit
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_started
    environment:
      DATABASE_URL: "postgres://ggid:ggid@postgres:5432/ggid?sslmode=disable"
      NATS_URL: "nats://nats:4222"
      AUDIT_HTTP_ADDR: ":8072"
      AUDIT_GRPC_ADDR: ":9072"
    ports:
      - "8072:8072"
      - "9072:9072"

  oauth:
    build:
      context: ..
      dockerfile: services/oauth/Dockerfile
    container_name: ggid-oauth
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      DATABASE_URL: "postgres://ggid:ggid@postgres:5432/ggid?sslmode=disable"
      REDIS_ADDR: "redis:6379"
    ports:
      - "9005:9005"

  console:
    build:
      context: ../console
      dockerfile: Dockerfile
    container_name: ggid-console
    depends_on:
      - gateway
    environment:
      GATEWAY_URL: "http://gateway:8080"
      NEXTAUTH_URL: "http://localhost:3000"
    ports:
      - "3000:3000"

volumes:
  ggid-pgdata:
  ggid-ldapdata:
  ggid-ldapconfig:
  ggid-configs:
