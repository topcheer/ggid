services:
  # === Infrastructure ===
  postgres:
    image: postgres:16-alpine
    container_name: ggid-postgres
    environment:
      POSTGRES_USER: ggid
      POSTGRES_PASSWORD: ggid
      POSTGRES_DB: ggid
    ports:
      - "5432:5432"
    volumes:
      - ggid-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ggid"]
      interval: 3s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: ggid-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 10

  nats:
    image: nats:2-alpine
    container_name: ggid-nats
    ports:
      - "4222:4222"
      - "8222:8222"
    command: ["-js", "-m", "8222"]
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8222/healthz"]
      interval: 5s
      timeout: 3s
      retries: 10

  ldap:
    image: osixia/openldap:1.5.0
    container_name: ggid-ldap
    environment:
      LDAP_ORGANISATION: "GGID Test Corp"
      LDAP_DOMAIN: "corp.local"
      LDAP_BASE_DN: "dc=corp,dc=local"
      LDAP_ADMIN_PASSWORD: "admin123"
    ports:
      - "389:389"
      - "636:636"
    volumes:
      - ggid-ldapdata:/var/lib/ldap
      - ggid-ldapconfig:/etc/ldap/slapd.d

  ldap-seed:
    image: osixia/openldap:1.5.0
    container_name: ggid-ldap-seed
    depends_on:
      ldap:
        condition: service_started
    environment:
      LDAP_HOST: "ldap"
      LDAP_PORT: "389"
      LDAP_ADMIN_PASSWORD: "admin123"
    entrypoint: ""
    command:
      - sh
      - -c
      - |
        sleep 5
        ldapadd -x -H ldap://ldap:389 -D cn=admin,dc=corp,dc=local -w admin123 -f /seed/users.ldif || true
        ldapadd -x -H ldap://ldap:389 -D cn=admin,dc=corp,dc=local -w admin123 -f /seed/groups.ldif || true
        echo 'LDAP seed done'
    volumes:
      - ./ldap-seed:/seed:ro
    restart: "no"

  # === RSA Key Generation ===
  keygen:
    image: alpine:3.20
    container_name: ggid-keygen
    entrypoint: ""
    command:
      - sh
      - -c
      - |
        if [ ! -f /configs/rsa_private.pem ]; then
          apk add --no-cache openssl
          openssl genpkey -algorithm RSA -out /configs/rsa_private.pem -pkeyopt rsa_keygen_bits:2048
          openssl rsa -pubout -in /configs/rsa_private.pem -out /configs/rsa_public.pem
          echo 'RSA keys generated'
        else
          echo 'RSA keys already exist'
        fi
    volumes:
      - ggid-configs:/configs
    restart: "no"

  # === Database Migrations ===
  migrate:
    image: golang:1.25-alpine
    container_name: ggid-migrate
    depends_on:
      postgres:
        condition: service_healthy
    working_dir: /app
    environment:
      DATABASE_URL: "postgres://${DB_USER:-ggid}:${DB_PASSWORD:-ggid}@${DB_HOST:-postgres}:${DB_PORT:-5432}/${DB_DATABASE:-ggid}?sslmode=${DB_SSL_MODE:-disable}"
    entrypoint: ["sh"]
    command:
      - -c
      - |
        apk add --no-cache postgresql-client
        TABLES=$(psql "$DATABASE_URL" -t -c "SELECT count(*) FROM information_schema.tables WHERE table_schema='public'" | tr -d ' ')
        if [ "$TABLES" -gt 0 ]; then
          echo "Database already initialized ($TABLES tables), skipping migrations"
        else
          cat /migrations/*.sql | psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -q
          echo 'Migrations complete'
        fi
    volumes:
      - ..:/app
      - ./migrations:/migrations:ro
    restart: "no"

  # === Microservices ===
  identity:
    build:
      context: ..
      dockerfile: services/identity/Dockerfile
    container_name: ggid-identity
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: "postgres://ggid:ggid@postgres:5432/ggid?sslmode=disable"
    ports:
      - "8081:8080"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/healthz"]
      interval: 5s
      timeout: 3s
      retries: 10

  auth:
    build:
      context: ..
      dockerfile: services/auth/Dockerfile
    container_name: ggid-auth
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      keygen:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: "postgres://${DB_USER:-ggid}:${DB_PASSWORD:-ggid}@${DB_HOST:-postgres}:${DB_PORT:-5432}/${DB_DATABASE:-ggid}?sslmode=${DB_SSL_MODE:-disable}"
      REDIS_ADDR: "${REDIS_HOST:-redis}:${REDIS_PORT:-6379}"
      AUTH_HTTP_ADDR: ":9001"
      JWT_PRIVATE_KEY_PATH: "/configs/rsa_private.pem"
      JWT_PUBLIC_KEY_PATH: "/configs/rsa_public.pem"
      LDAP_URL: "${LDAP_URL:-ldap://ldap:389}"
      LDAP_BIND_DN: "${LDAP_BIND_DN:-cn=admin,dc=corp,dc=local}"
      LDAP_BIND_PASSWORD: "${LDAP_BIND_PASSWORD:-admin123}"
      LDAP_BASE_DN: "${LDAP_BASE_DN:-dc=corp,dc=local}"
      LDAP_USER_FILTER: "${LDAP_USER_FILTER:-(&(objectClass=inetOrgPerson)(cn=%s))}"
      LDAP_AUTO_PROVISION: "${LDAP_AUTO_PROVISION:-true}"
    ports:
      - "9001:9001"
    volumes:
      - ggid-configs:/configs
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9001/healthz"]
      interval: 5s
      timeout: 3s
      retries: 10

  gateway:
    build:
      context: ..
      dockerfile: services/gateway/Dockerfile
    container_name: ggid-gateway
    depends_on:
      auth:
        condition: service_started
      identity:
        condition: service_started
      policy:
        condition: service_started
      org:
        condition: service_started
      audit:
        condition: service_started
    environment:
      GATEWAY_ADDR: ":8080"
      JWT_PUBLIC_KEY_PATH: "/configs/rsa_public.pem"
      AUTH_SERVICE_URL: "http://auth:9001"
      IDENTITY_SERVICE_URL: "http://identity:8080"
      USERS_SERVICE_URL: "http://identity:8080"
      POLICY_SERVICE_URL: "http://policy:8070"
      ROLES_SERVICE_URL: "http://policy:8070"
      PERMISSIONS_SERVICE_URL: "http://policy:8070"
      ORG_SERVICE_URL: "http://org:8071"
      AUDIT_SERVICE_URL: "http://audit:8072"
      OAUTH_SERVICE_URL: "http://oauth:9005"
      SAML_SERVICE_URL: "http://oauth:9005"
    ports:
      - "8080:8080"
    volumes:
      - ggid-configs:/configs:ro

  policy:
    build:
      context: ..
      dockerfile: services/policy/Dockerfile
    container_name: ggid-policy
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      DB_HOST: "${DB_HOST:-postgres}"
      DB_PORT: "${DB_PORT:-5432}"
      DB_USER: "${DB_USER:-ggid}"
      DB_PASSWORD: "${DB_PASSWORD:-ggid}"
      DB_DATABASE: "${DB_DATABASE:-ggid}"
      DB_SSL_MODE: "${DB_SSL_MODE:-disable}"
      POLICY_HTTP_ADDR: ":8070"
      POLICY_GRPC_ADDR: ":9070"
      NATS_URL: "${NATS_URL:-nats://nats:4222}"
    ports:
      - "8070:8070"
      - "9070:9070"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8070/healthz"]
      interval: 5s
      timeout: 3s
      retries: 10

  org:
    build:
      context: ..
      dockerfile: services/org/Dockerfile
    container_name: ggid-org
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      DB_HOST: "${DB_HOST:-postgres}"
      DB_PORT: "${DB_PORT:-5432}"
      DB_USER: "${DB_USER:-ggid}"
      DB_PASSWORD: "${DB_PASSWORD:-ggid}"
      DB_DATABASE: "${DB_DATABASE:-ggid}"
      DB_SSL_MODE: "${DB_SSL_MODE:-disable}"
      ORG_HTTP_ADDR: ":8071"
      ORG_GRPC_ADDR: ":9071"
      NATS_URL: "${NATS_URL:-nats://nats:4222}"
    ports:
      - "8071:8071"
      - "9071:9071"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8071/healthz"]
      interval: 5s
      timeout: 3s
      retries: 10

  audit:
    build:
      context: ..
      dockerfile: services/audit/Dockerfile
    container_name: ggid-audit
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_started
      migrate:
        condition: service_completed_successfully
    environment:
      DB_HOST: "${DB_HOST:-postgres}"
      DB_PORT: "${DB_PORT:-5432}"
      DB_USER: "${DB_USER:-ggid}"
      DB_PASSWORD: "${DB_PASSWORD:-ggid}"
      DB_DATABASE: "${DB_DATABASE:-ggid}"
      DB_SSL_MODE: "${DB_SSL_MODE:-disable}"
      NATS_URL: "${NATS_URL:-nats://nats:4222}"
      AUDIT_HTTP_ADDR: ":8072"
      AUDIT_GRPC_ADDR: ":9072"
      AUDIT_HASH_CHAIN_SECRET: "${AUDIT_HASH_CHAIN_SECRET:-ggid-audit-hash-chain-dev-key-change-in-prod}"
    ports:
      - "8072:8072"
      - "9072:9072"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8072/healthz"]
      interval: 5s
      timeout: 3s
      retries: 10

  oauth:
    build:
      context: ..
      dockerfile: services/oauth/Dockerfile
    container_name: ggid-oauth
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      keygen:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: "postgres://ggid:ggid@postgres:5432/ggid?sslmode=disable"
      REDIS_ADDR: "redis:6379"
      OAUTH_PRIVATE_KEY_PATH: "/configs/rsa_private.pem"
      OAUTH_PUBLIC_KEY_PATH: "/configs/rsa_public.pem"
    ports:
      - "9005:9005"
    volumes:
      - ggid-configs:/configs:ro
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9005/healthz"]
      interval: 5s
      timeout: 3s
      retries: 10

  console:
    build:
      context: ..
      dockerfile: console/Dockerfile
    container_name: ggid-console
    depends_on:
      gateway:
        condition: service_started
    environment:
      GATEWAY_URL: "http://gateway:8080"
      NEXT_PUBLIC_API_URL: "http://localhost:8080"
      NEXT_PUBLIC_TENANT_ID: "00000000-0000-0000-0000-000000000001"
      NEXTAUTH_URL: "http://localhost:3000"
    ports:
      - "3000:3000"

volumes:
  ggid-pgdata:
  ggid-ldapdata:
  ggid-ldapconfig:
  ggid-configs:
