apiVersion: apps/v1
kind: Deployment
metadata:
  name: erp-ruby
  namespace: ggid
  labels:
    app: erp-ruby
spec:
  replicas: 1
  selector:
    matchLabels:
      app: erp-ruby
  template:
    metadata:
      labels:
        app: erp-ruby
    spec:
      containers:
      - name: erp-ruby
        image: registry.iot2.win/ggid/erp-ruby:latest
        ports:
        - containerPort: 9091
        env:
        - name: GGID_URL
          value: "http://ggid-gateway.ggid.svc.cluster.local:8080"
        - name: GGID_TENANT_ID
          value: "00000007-0000-0000-0000-000000000001"
        - name: ERP_LISTEN
          value: "9091"
---
apiVersion: v1
kind: Service
metadata:
  name: erp-ruby
  namespace: ggid
spec:
  selector:
    app: erp-ruby
  ports:
  - port: 80
    targetPort: 9091
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: erp-ruby
  namespace: ggid
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
spec:
  ingressClassName: traefik
  rules:
  - host: erp-ruby.iot2.win
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: erp-ruby
            port:
              number: 80
