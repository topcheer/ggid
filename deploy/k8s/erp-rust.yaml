apiVersion: apps/v1
kind: Deployment
metadata:
  name: erp-rust
  namespace: ggid
  labels:
    app: erp-rust
spec:
  replicas: 1
  selector:
    matchLabels:
      app: erp-rust
  template:
    metadata:
      labels:
        app: erp-rust
    spec:
      containers:
      - name: erp-rust
        image: registry.iot2.win/ggid/erp-rust:latest
        ports:
        - containerPort: 9092
        env:
        - name: GGID_URL
          value: "http://ggid-gateway.ggid.svc.cluster.local:8080"
        - name: TENANT_ID
          value: "00000008-0000-0000-0000-000000000001"
---
apiVersion: v1
kind: Service
metadata:
  name: erp-rust
  namespace: ggid
spec:
  selector:
    app: erp-rust
  ports:
  - port: 80
    targetPort: 9092
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: erp-rust
  namespace: ggid
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
spec:
  ingressClassName: traefik
  rules:
  - host: erp-rust.iot2.win
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: erp-rust
            port:
              number: 80
