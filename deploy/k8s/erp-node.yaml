apiVersion: apps/v1
kind: Deployment
metadata:
  name: erp-node
  namespace: ggid
spec:
  replicas: 1
  selector:
    matchLabels:
      app: erp-node
  template:
    metadata:
      labels:
        app: erp-node
    spec:
      containers:
      - name: erp-node
        image: registry.iot2.win/ggid/erp-node:latest
        ports:
        - containerPort: 3200
        env:
        - name: GGID_URL
          value: "http://ggid-gateway.ggid.svc.cluster.local:8080"
        - name: GGID_TENANT
          value: "00000000-0000-0000-0000-000000000002"
        - name: ERP_CLIENT_ID
          value: "erp-node-m2m"
        - name: ERP_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: erp-node-secrets
              key: client_secret
        - name: PORT
          value: "3200"
---
apiVersion: v1
kind: Service
metadata:
  name: erp-node
  namespace: ggid
spec:
  selector:
    app: erp-node
  ports:
  - port: 80
    targetPort: 3200
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: erp-node
  namespace: ggid
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
spec:
  rules:
  - host: erp-node.iot2.win
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: erp-node
            port:
              number: 80
