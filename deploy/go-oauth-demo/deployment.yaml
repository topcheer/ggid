apiVersion: apps/v1
kind: Deployment
metadata:
  name: go-oauth-demo
  namespace: ggid
  labels:
    app: go-oauth-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: go-oauth-demo
  template:
    metadata:
      labels:
        app: go-oauth-demo
    spec:
      containers:
      - name: demo
        image: registry.iot2.win/cross-erp/go-oauth-demo:latest
        ports:
        - containerPort: 9090
        env:
        - name: GGID_URL
          value: "http://ggid-gateway:8080"
        - name: CLIENT_ID
          value: "gcid_t03gRZF0hAXVdK4ZSMYeZg"
        - name: CLIENT_SECRET
          value: "gcs_5TFzLW2R3pqfqGN9rEE6kql3-rABzQRzfE4pmpLDpII"
        - name: REDIRECT_URI
          value: "https://go-oauth-demo.iot2.win/callback"
        - name: PORT
          value: "9090"
        - name: TENANT_ID
          value: "00000000-0000-0000-0000-000000000001"
---
apiVersion: v1
kind: Service
metadata:
  name: go-oauth-demo
  namespace: ggid
spec:
  selector:
    app: go-oauth-demo
  ports:
  - port: 80
    targetPort: 9090
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: go-oauth-demo
  namespace: ggid
spec:
  entryPoints:
  - websecure
  routes:
  - match: Host(`go-oauth-demo.iot2.win`)
    kind: Rule
    services:
    - name: go-oauth-demo
      port: 80
  tls: {}
