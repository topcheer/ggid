version: "3.9"

# GGID All-in-One Deployment
# Usage: docker compose -f deploy/docker-compose.yml up -d

services:
  ggid:
    image: ggid/ggid-all-in-one:latest
    build:
      context: ..
      dockerfile: deploy/all-in-one/Dockerfile
    ports:
      - "8080:8080"   # API Gateway
      - "3000:3000"   # Console (Next.js)
    environment:
      # Database (internal PG)
      - DATABASE_URL=postgres://ggid:ggid@localhost:5432/ggid?sslmode=disable
      - DB_PASSWORD=${DB_PASSWORD:-ggid}
      # Redis (internal)
      - REDIS_URL=redis://localhost:6379
      # NATS (internal)
      - NATS_URL=nats://localhost:4222
      # Gateway
      - GATEWAY_ADDR=:8080
      - GATEWAY_URL=http://localhost:8080
      # Service addresses (all localhost in all-in-one)
      - IDENTITY_HTTP_ADDR=:8081
      - AUTH_HTTP_ADDR=:9001
      - OAUTH_HTTP_ADDR=:9005
      - POLICY_HTTP_ADDR=:8070
      - ORG_HTTP_ADDR=:8071
      - AUDIT_HTTP_ADDR=:8072
      - IDENTITY_SERVICE_URL=http://localhost:8081
      - AUTH_SERVICE_URL=http://localhost:9001
      - OAUTH_SERVICE_URL=http://localhost:9005
      - POLICY_SERVICE_URL=http://localhost:8070
      - ORG_SERVICE_URL=http://localhost:8071
      - AUDIT_SERVICE_URL=http://localhost:8072
      # Console
      - NEXT_PUBLIC_API_URL=
      - NEXT_PUBLIC_TENANT_ID=00000000-0000-0000-0000-000000000001
      # Security (change in production!)
      - INTERNAL_AUTH_SECRET=${INTERNAL_AUTH_SECRET:-change-me-in-production}
      # Optional: External SMTP
      # - SMTP_HOST=smtp.gmail.com
      # - SMTP_PORT=587
      # - SMTP_USER=
      # - SMTP_PASSWORD=
    volumes:
      - ggid-pg-data:/var/lib/postgresql/data
      - ggid-redis-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

volumes:
  ggid-pg-data:
  ggid-redis-data:
