apiVersion: apps/v1
kind: Deployment
metadata:
  name: erp-rust
  namespace: ggid
spec:
  replicas: 1
  selector: { matchLabels: { app: erp-rust } }
  template:
    metadata: { labels: { app: erp-rust } }
    spec:
      containers:
      - name: erp-rust
        image: registry.iot2.win/ggid/erp-rust:latest
        ports: [{ containerPort: 9092 }]
        env:
        - { name: GGID_URL, value: "http://ggid-gateway:8080" }
        - { name: TENANT_ID, value: "00000008-0000-0000-0000-000000000001" }
---
apiVersion: v1
kind: Service
metadata: { name: erp-rust, namespace: ggid }
spec: { selector: { app: erp-rust }, ports: [{ port: 80, targetPort: 9092 }] }
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata: { name: erp-rust, namespace: ggid }
spec:
  entryPoints: [websecure]
  routes:
  - match: Host(`erp-rust.iot2.win`)
    kind: Rule
    services: [{ name: erp-rust, port: 80 }]
  tls: {}
